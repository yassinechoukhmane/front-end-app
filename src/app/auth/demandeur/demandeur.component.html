<div class="app-container">
  <aside class="sidebar">
    <h2>Target Metal Works</h2>
    <nav>
      <h4>Discover</h4>
      <ul>
        <li><a routerLink="/demandeur" routerLinkActive="active">🏠 Home</a></li>
      </ul>
      <h4>Purchases</h4>
      <ul>
        <li><a routerLink="/purchases" routerLinkActive="active">🛒 All purchases</a></li>
        <li><a routerLink="/drafts" routerLinkActive="active">📝 Drafts</a></li>
      </ul>
    </nav>
  </aside>

  <main class="main-content">
    <div class="header">
      <div class="date">📅 {{ currentDate | date: 'dd/MM/yyyy' }}</div>
      <div class="account">
        <a routerLink="/profile" class="account-link">👤 {{ username }}</a>
      </div>
    </div>

    <div class="content-container">
      <h1 class="page-title">Create a New Purchase Request</h1>
      <p class="welcome-message">Welcome back, {{ username }}!</p>

      <form class="request-form" (ngSubmit)="submitRequest()" #requestForm="ngForm">
        <div class="form-header">
          <span class="request-info">Request: {{ requestNumber }}</span>
          <span class="date-info">Date: {{ currentDate | date: 'dd/MM/yyyy' }}</span>
        </div>

        <div class="form-grid">
          <div class="form-group quantity-field">
            <label for="quantity">Quantité:</label>
            <input
              type="number"
              id="quantity"
              [(ngModel)]="request.qte"
              name="qte"
              min="0"
              (input)="validateQuantity($event)"
              placeholder="Entrez la quantité"
              required>
          </div>

          <div class="form-group">
            <label for="details">Description:</label>
            <textarea
              id="details"
              [(ngModel)]="request.details"
              name="details"
              placeholder="Entrez une description détaillée..."
              required></textarea>
          </div>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-secondary" (click)="saveAsDraft()">Save as Draft</button>
          <button type="submit" class="btn btn-primary" [disabled]="!requestForm.form.valid">
            Submit Request
          </button>
        </div>
      </form>
    </div>
  </main>
</div>
